<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗼 도쿄 여행 가이드 🍡</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="leaflet.css"/>
<script>window.onerror=function(m,s,l){var d=document.getElementById('jsError');if(!d){d=document.createElement('div');d.id='jsError';d.style.cssText='position:fixed;top:0;left:0;right:0;z-index:99999;background:red;color:white;padding:10px;font-size:12px;font-family:monospace;white-space:pre-wrap';(document.body||document.documentElement).appendChild(d)}d.textContent+='ERROR: '+m+' (line '+l+')\n'}</script>
<script src="leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{--cream:#FFF8F0;--pink:#FFB5B5;--pink-light:#FFE0E0;--peach:#FFDAB3;--mint:#B5E8D5;--mint-light:#E0F5EC;--sky:#B5D8F7;--sky-light:#E0EFFE;--lavender:#D4BEF0;--lavender-light:#EDE0FA;--yellow:#FFE9A0;--yellow-light:#FFF4D1;--coral:#FF8C7C;--brown:#8B6F5A;--brown-light:#A68B7B;--text:#5A4A3F;--text-light:#8B7B6F;--white:#fff;--shadow:rgba(139,111,90,.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--cream);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-weight:400;line-height:1.7;overflow-x:hidden}
.float-deco{position:fixed;pointer-events:none;z-index:0;opacity:.12;font-size:3rem;animation:floaty 8s ease-in-out infinite}
.float-deco:nth-child(1){top:10%;left:5%}.float-deco:nth-child(2){top:30%;right:8%;animation-delay:2s}.float-deco:nth-child(3){top:55%;left:3%;animation-delay:4s}.float-deco:nth-child(4){top:75%;right:5%;animation-delay:6s}.float-deco:nth-child(5){top:90%;left:10%;animation-delay:1s}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-20px) rotate(5deg)}}

/* Hero */
.hero{text-align:center;padding:3rem 1.5rem 2rem;background:linear-gradient(180deg,var(--pink-light) 0%,var(--cream) 100%);position:relative;overflow:hidden}
.hero-emoji{font-size:3.5rem;display:block;margin-bottom:.3rem;animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.hero h1{font-family:'Gaegu',cursive;font-size:2.6rem;font-weight:700;color:var(--brown);letter-spacing:-1px}
.hero h1 span{color:var(--coral)}
.hero-sub{font-family:'Gaegu',cursive;font-size:1.2rem;color:var(--brown-light);margin-top:.3rem}

/* Tabs for sections */
.main-tabs{display:flex;justify-content:center;gap:.4rem;padding:.7rem 1rem;background:var(--cream);position:sticky;top:0;z-index:200;border-bottom:2px solid var(--pink-light);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);background:rgba(255,248,240,.92);flex-wrap:wrap}
.main-tab{font-family:'Gaegu',cursive;font-size:1.1rem;font-weight:700;padding:.5rem 1.2rem;border-radius:100px;border:2px solid var(--pink-light);background:var(--white);color:var(--brown);cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1)}
.main-tab:hover,.main-tab.active{background:var(--coral);border-color:var(--coral);color:var(--white);transform:translateY(-2px);box-shadow:0 4px 12px rgba(255,140,124,.3)}

.panel{display:none}.panel.active{display:block}

/* ===== MAP PANEL ===== */
.map-container{max-width:960px;margin:1.5rem auto;padding:0 1rem}
#realMap{width:100%;height:400px;border-radius:20px;border:2px solid var(--pink-light);overflow:hidden;box-shadow:0 4px 20px rgba(139,111,90,.1);background:#e8e0d8}
@media(max-width:599px){#realMap{height:300px}}
.map-area-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:1rem}
@media(max-width:599px){.map-area-grid{grid-template-columns:repeat(2,1fr)}}
.map-area-card{background:var(--white);border-radius:14px;padding:.8rem;text-align:center;cursor:pointer;border:2px solid var(--pink-light);transition:all .3s cubic-bezier(.34,1.56,.64,1)}
.map-area-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px var(--shadow)}
.map-area-card .area-emoji{font-size:1.8rem;display:block}
.map-area-card .area-name{font-family:'Gaegu',cursive;font-size:1.1rem;font-weight:700;color:var(--brown);margin-top:.2rem}
.map-area-card .area-count{font-size:.75rem;color:var(--text-light)}
.map-area-card .area-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:.3rem}
.map-iframe-wrap{border-radius:20px;overflow:hidden;border:2px solid var(--pink-light);box-shadow:0 4px 20px var(--shadow);margin-top:1rem}
.map-iframe-wrap iframe{width:100%;height:400px;border:none;display:block}
@media(max-width:599px){.map-iframe-wrap iframe{height:300px}}

/* ===== PLANNER PANEL ===== */
.planner-wrap{max-width:900px;margin:1.5rem auto;padding:0 1rem}
.planner-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.planner-title{font-family:'Gaegu',cursive;font-size:1.8rem;font-weight:700;color:var(--brown)}
.planner-actions{display:flex;gap:.4rem}
.planner-btn{font-family:'Gaegu',cursive;font-size:.95rem;font-weight:700;padding:.4rem .9rem;border-radius:100px;border:2px solid var(--pink-light);background:var(--white);color:var(--brown);cursor:pointer;transition:all .25s}
.planner-btn:hover{background:var(--pink);color:var(--white);border-color:var(--pink)}
.planner-btn.danger:hover{background:var(--coral);border-color:var(--coral);color:var(--white)}
.day-block{background:var(--white);border-radius:16px;padding:1.2rem;margin-bottom:1rem;border:2px solid var(--pink-light);box-shadow:0 2px 12px var(--shadow)}
.day-title{font-family:'Gaegu',cursive;font-size:1.4rem;font-weight:700;color:var(--coral);margin-bottom:.8rem;display:flex;align-items:center;gap:.4rem}
.meal-row{display:flex;align-items:center;gap:.6rem;padding:.6rem .8rem;border-radius:12px;margin-bottom:.5rem;background:var(--cream);min-height:52px;transition:all .2s}
.meal-row:hover{background:var(--pink-light)}
.meal-row.dragover{border:2px dashed var(--coral);background:var(--yellow-light)}
.meal-label{font-family:'Gaegu',cursive;font-weight:700;font-size:1rem;color:var(--brown);min-width:42px;flex-shrink:0}
.meal-slot{flex:1;min-height:32px;border-radius:8px;display:flex;align-items:center;flex-wrap:wrap;gap:.3rem}
.meal-chip{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .7rem;border-radius:100px;font-size:.82rem;font-weight:500;background:var(--white);border:1.5px solid var(--pink-light);color:var(--brown);animation:chipIn .3s ease}
@keyframes chipIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.meal-chip .chip-remove{cursor:pointer;font-size:.7rem;color:var(--text-light);margin-left:.1rem;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.meal-chip .chip-remove:hover{background:var(--coral);color:var(--white)}
.meal-chip .chip-map{cursor:pointer;font-size:.65rem;margin-left:.15rem;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.meal-chip .chip-map:hover{background:var(--sky);transform:scale(1.2)}
.meal-empty{font-size:.82rem;color:var(--text-light);font-style:italic}
.add-to-meal-btn{font-size:.65rem;padding:.2rem .5rem;border-radius:100px;border:1.5px solid var(--mint);background:var(--mint-light);color:#408060;cursor:pointer;font-weight:500;transition:all .2s;white-space:nowrap}
.add-to-meal-btn:hover{background:var(--mint);color:var(--white)}

/* Meal picker modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.show{display:flex}
.modal{background:var(--cream);border-radius:20px;max-width:500px;width:100%;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;border:2px solid var(--pink-light);box-shadow:0 12px 40px rgba(0,0,0,.15)}
.modal-head{padding:1rem 1.2rem;border-bottom:2px solid var(--pink-light);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-family:'Gaegu',cursive;font-size:1.3rem;font-weight:700;color:var(--brown)}
.modal-close{width:30px;height:30px;border-radius:50%;border:none;background:var(--pink-light);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:var(--coral);color:var(--white)}
.modal-search{padding:.8rem 1.2rem;border-bottom:1px solid var(--pink-light)}
.modal-search input{width:100%;padding:.5rem .8rem;border-radius:100px;border:2px solid var(--pink-light);font-size:.9rem;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border .2s}
.modal-search input:focus{border-color:var(--coral)}
.modal-list{flex:1;overflow-y:auto;padding:.5rem}
.modal-item{display:flex;align-items:center;justify-content:space-between;padding:.6rem .8rem;border-radius:10px;cursor:pointer;transition:all .15s;gap:.5rem}
.modal-item:hover{background:var(--pink-light)}
.modal-item-name{font-size:.9rem;font-weight:500;flex:1}
.modal-item-area{font-size:.72rem;color:var(--text-light);flex-shrink:0}
.modal-item-cat{font-size:.68rem;padding:.15rem .45rem;border-radius:100px;flex-shrink:0}

/* ===== LIST PANEL ===== */
.nav-wrap{padding:.8rem 1rem;border-bottom:2px solid var(--pink-light)}
.nav-pills{display:flex;gap:.5rem;overflow-x:auto;scrollbar-width:none;max-width:900px;margin:0 auto;padding-bottom:4px}
.nav-pills::-webkit-scrollbar{display:none}
.nav-pill{flex-shrink:0;padding:.4rem .9rem;border-radius:100px;border:2px solid var(--pink-light);background:var(--white);font-family:'Gaegu',cursive;font-size:.95rem;font-weight:700;color:var(--brown);cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
.nav-pill:hover,.nav-pill.active{background:var(--pink);border-color:var(--pink);color:var(--white);transform:translateY(-2px);box-shadow:0 4px 12px rgba(255,181,181,.4)}
.filter-wrap{max-width:900px;margin:1rem auto 0;padding:0 1.5rem;display:flex;gap:.4rem;flex-wrap:wrap}
.filter-pill{padding:.25rem .7rem;border-radius:100px;border:1.5px solid var(--peach);background:var(--white);font-size:.75rem;color:var(--brown-light);cursor:pointer;transition:all .25s}
.filter-pill:hover,.filter-pill.active{background:var(--peach);color:var(--white);border-color:var(--peach)}
.progress-wrap{max-width:900px;margin:0 auto;padding:0 1.5rem;margin-top:1rem}
.progress-label{font-family:'Gaegu',cursive;font-size:1rem;color:var(--brown-light);margin-bottom:.4rem}
.progress-bar{height:10px;background:var(--pink-light);border-radius:100px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--coral));border-radius:100px;transition:width .5s cubic-bezier(.34,1.56,.64,1)}
.content{max-width:900px;margin:0 auto;padding:1.5rem;position:relative;z-index:1}
.section{margin-bottom:2.5rem}
.section-header{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:3px dashed var(--pink-light)}
.section-emoji{font-size:1.6rem;animation:wiggle 3s ease-in-out infinite}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
.section-title{font-family:'Gaegu',cursive;font-size:1.5rem;font-weight:700;color:var(--brown)}
.section-count{font-family:'Gaegu',cursive;font-size:.85rem;color:var(--white);background:var(--pink);padding:.1rem .55rem;border-radius:100px}
.cards{display:grid;grid-template-columns:1fr;gap:.7rem}
.card{background:var(--white);border-radius:14px;padding:.9rem 5rem .9rem 1.1rem;border:2px solid transparent;transition:all .3s cubic-bezier(.34,1.56,.64,1);cursor:default;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:4px 0 0 4px;transition:all .3s}
.card[data-cat="라멘"]::before,.card[data-cat="츠케멘"]::before{background:var(--coral)}.card[data-cat="야끼니꾸"]::before{background:#E85D4A}.card[data-cat="꼬치"]::before,.card[data-cat="닭꼬치"]::before{background:var(--peach)}.card[data-cat="돈가스"]::before,.card[data-cat="가츠동"]::before{background:var(--yellow)}.card[data-cat="스시"]::before,.card[data-cat="오마카세"]::before,.card[data-cat="회덮밥"]::before{background:var(--sky)}.card[data-cat="장어"]::before{background:var(--brown)}.card[data-cat="몬자야끼"]::before{background:var(--lavender)}.card[data-cat="함바그"]::before,.card[data-cat="떡갈비"]::before{background:#C97B5D}.card[data-cat="카레"]::before{background:#E8A840}.card[data-cat="카페"]::before,.card[data-cat="베이커리"]::before,.card[data-cat="디저트"]::before{background:var(--pink)}.card[data-cat="이자카야"]::before,.card[data-cat="술집"]::before{background:var(--mint)}.card[data-cat="기타"]::before{background:var(--text-light)}
.card:hover{transform:translateY(-2px);border-color:var(--pink-light);box-shadow:0 6px 20px var(--shadow)}
.card-top{display:flex;align-items:flex-start;gap:.5rem}
.card-name{font-family:'Gaegu',cursive;font-size:1.2rem;font-weight:700;color:var(--brown);line-height:1.3;flex:1;min-width:0;word-break:keep-all}
.card-name .star{color:var(--coral);font-size:.85rem}
.card-tag{flex-shrink:0;font-size:.7rem;padding:.18rem .55rem;border-radius:100px;font-weight:500}
.tag-ramen{background:#FFE5E2;color:#D4513E}.tag-yakiniku{background:#FFE0D5;color:#C44A38}.tag-kushiyaki{background:#FFF0DE;color:#B8802A}.tag-tonkatsu{background:#FFF5D5;color:#A88520}.tag-sushi{background:#E0EFFE;color:#4A7FB8}.tag-unagi{background:#F0E8DF;color:#6B5040}.tag-monja{background:#EDE0FA;color:#7B5BA8}.tag-hamburg{background:#F5E5DA;color:#956B50}.tag-curry{background:#FFF0D5;color:#A07020}.tag-cafe{background:#FFE0E0;color:#C86060}.tag-izakaya{background:#E0F5EC;color:#408060}.tag-other{background:#EDE8E3;color:#7B6B5F}
.card-meta{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.4rem}
.card-note{font-size:.78rem;color:var(--text-light);margin-top:.35rem;padding:.35rem .55rem;background:var(--cream);border-radius:8px;line-height:1.5}
.badge{display:inline-flex;align-items:center;gap:.2rem;padding:.12rem .45rem;border-radius:6px;font-size:.7rem}
.badge-rating{background:var(--yellow-light);color:#8B7020}.badge-reserve{background:var(--pink-light);color:#B85050}.badge-cash{background:var(--mint-light);color:#407050}.badge-hours{background:var(--sky-light);color:#4070A0}
.card-check{position:absolute;top:.7rem;right:.7rem;width:22px;height:22px;border-radius:6px;border:2px solid var(--pink-light);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;font-size:.7rem}
.card-check:hover{border-color:var(--pink)}.card-check.checked{background:var(--pink);border-color:var(--pink)}.card-check.checked::after{content:'✓';color:white;font-weight:700}
.card-map-btn{position:absolute;top:.7rem;right:2.2rem;width:22px;height:22px;border-radius:6px;background:var(--sky-light);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.7rem;transition:all .3s;border:2px solid var(--sky)}
.card-map-btn:hover{background:var(--sky);transform:scale(1.1)}
.card-plan-btn{position:absolute;top:.7rem;right:3.7rem;width:22px;height:22px;border-radius:6px;background:var(--yellow-light);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.7rem;transition:all .3s;border:2px solid var(--yellow)}
.card-plan-btn:hover{background:var(--yellow);transform:scale(1.1)}
.card.visited{opacity:.5}.card.visited .card-name{text-decoration:line-through;text-decoration-color:var(--pink)}
.card .add-to-meal-btn{position:absolute;bottom:.6rem;right:.6rem}

.footer{text-align:center;padding:2.5rem 1.5rem;font-family:'Gaegu',cursive;color:var(--brown-light);font-size:1rem}
.footer-emoji{font-size:2rem;display:block;margin-bottom:.4rem}

/* Splash screen - pure CSS auto-hide */
.splash{position:fixed;inset:0;z-index:9999;background:linear-gradient(180deg,var(--pink-light),var(--cream));display:flex;flex-direction:column;align-items:center;justify-content:center;animation:splashGo 0.6s ease 2.5s forwards}
@keyframes splashGo{to{opacity:0;visibility:hidden;pointer-events:none}}
.splash-plane{font-size:3rem;animation:fly 2s ease-in-out infinite}
@keyframes fly{0%,100%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(10px,-15px) rotate(-5deg)}}
.splash-text{font-family:'Gaegu',cursive;font-size:1.8rem;font-weight:700;color:var(--brown);margin-top:1rem}
.splash-sub{font-family:'Gaegu',cursive;font-size:1rem;color:var(--brown-light);margin-top:.3rem}
.splash-dots{margin-top:.8rem;display:flex;gap:.4rem}
.splash-dots span{width:8px;height:8px;border-radius:50%;background:var(--pink);animation:dotBounce 1.2s ease-in-out infinite}
.splash-dots span:nth-child(2){animation-delay:.2s}
.splash-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotBounce{0%,100%{transform:translateY(0);opacity:.3}50%{transform:translateY(-8px);opacity:1}}
.sync-badge{position:fixed;bottom:1rem;right:1rem;z-index:300;padding:.4rem .8rem;border-radius:100px;font-family:'Gaegu',cursive;font-size:.85rem;font-weight:700;box-shadow:0 2px 12px var(--shadow);display:flex;align-items:center;gap:.3rem;transition:all .3s}
.sync-badge.online{background:var(--mint);color:#2a6b4a}.sync-badge.offline{background:var(--yellow);color:#8B7020}

@media(min-width:600px){.cards{grid-template-columns:1fr 1fr}.hero h1{font-size:3rem}}
@media(max-width:599px){.hero h1{font-size:2rem}.hero-emoji{font-size:2.8rem}.section-title{font-size:1.2rem}.main-tab{font-size:.95rem;padding:.4rem .8rem}}
.card{opacity:0;transform:translateY(12px)}.card.show{opacity:1;transform:translateY(0);transition:all .35s ease}.card.visited.show{opacity:.5}

/* Review */
.review-card{background:var(--white);border-radius:14px;padding:1rem;margin-bottom:.7rem;border:2px solid var(--pink-light)}
.review-card-top{display:flex;align-items:center;gap:.6rem;margin-bottom:.5rem}
.review-card-name{font-family:'Gaegu',cursive;font-size:1.15rem;font-weight:700;color:var(--brown);flex:1}
.review-card-area{font-size:.72rem;color:var(--text-light)}
.review-stars{display:flex;gap:.15rem;margin-bottom:.5rem}
.review-star{font-size:1.4rem;cursor:pointer;transition:transform .15s}
.review-star:hover{transform:scale(1.3)}
.review-textarea{width:100%;border:1.5px solid var(--pink-light);border-radius:10px;padding:.5rem .7rem;font-size:.82rem;font-family:'Noto Sans KR',sans-serif;outline:none;color:var(--text);resize:vertical;min-height:40px;line-height:1.5;background:var(--cream)}
.review-textarea:focus{border-color:var(--coral)}
.review-empty{text-align:center;padding:3rem;font-family:'Gaegu',cursive;font-size:1.2rem;color:var(--brown-light)}
.souv-cat{background:var(--white);border-radius:14px;padding:1rem;margin-bottom:1rem;border:2px solid var(--peach)}
.souv-cat-title{font-family:'Gaegu',cursive;font-size:1.2rem;font-weight:700;color:var(--brown);display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
.souv-item{display:flex;gap:.6rem;padding:.6rem;background:var(--cream);border-radius:10px;margin-bottom:.5rem;flex-wrap:wrap}
.souv-item img{width:100%;max-width:280px;height:auto;border-radius:8px;border:1.5px solid var(--pink-light);cursor:pointer}
.souv-item-text{flex:1;min-width:150px;font-size:.82rem;color:var(--text);line-height:1.5}

/* Fullscreen photo overlay */
.photo-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.85);align-items:center;justify-content:center;padding:1rem;cursor:pointer}
.photo-overlay.show{display:flex}
.photo-overlay img{max-width:100%;max-height:90vh;border-radius:12px;object-fit:contain}
.souv-item-nick{font-family:'Gaegu',cursive;font-weight:700;color:var(--coral);font-size:.8rem}
.souv-add-row{display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.5rem;align-items:flex-end}
.souv-add-row input,.souv-add-row textarea{padding:.35rem .5rem;border:1.5px solid var(--pink-light);border-radius:8px;font-size:.78rem;outline:none;font-family:'Noto Sans KR',sans-serif}
.souv-photo-label{display:inline-flex;align-items:center;gap:.2rem;padding:.35rem .6rem;border-radius:8px;background:var(--sky-light);border:1.5px solid var(--sky);font-size:.75rem;cursor:pointer;color:var(--text)}

function initFirebase(){
  try{
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.database();
    useFirebase=true;
    updateSyncBadge('online');

    db.ref('visited').on('value',snap=>{
      visited=snap.val()||{};
      renderList();
    });

    db.ref('planner').on('value',snap=>{
      planner=snap.val()||JSON.parse(JSON.stringify(defaultPlanner));
      planner.forEach(function(d){
        if(!d.meals)d.meals={};
        if(!d.meals['점심'])d.meals['점심']=[];
        if(!d.meals['저녁'])d.meals['저녁']=[];
        if(!d.meals['간식'])d.meals['간식']=[];
        if(!d.meals['관광'])d.meals['관광']=[];
        if(!d.meals['메모'])d.meals['메모']=[];
      });
      renderPlanner();
    });

    // connection state
    db.ref('.info/connected').on('value',snap=>{
      updateSyncBadge(snap.val()?'online':'reconnecting');
    });
  }catch(e){
    console.error('Firebase error:',e);
    useFirebase=false;
    updateSyncBadge('offline');
    visited=JSON.parse(localStorage.getItem('tokyoVisited')||'{}');
    planner=JSON.parse(localStorage.getItem('tokyoPlanner')||'null')||JSON.parse(JSON.stringify(defaultPlanner));
    planner.forEach(function(d){if(!d.meals)d.meals={};if(!d.meals['점심'])d.meals['점심']=[];if(!d.meals['저녁'])d.meals['저녁']=[];if(!d.meals['간식'])d.meals['간식']=[];if(!d.meals['관광'])d.meals['관광']=[];if(!d.meals['메모'])d.meals['메모']=[];});
    renderPlanner();renderList();
  }
}

function saveVisited(){
  if(useFirebase&&db){db.ref('visited').set(visited)}
  else{localStorage.setItem('tokyoVisited',JSON.stringify(visited))}
}

function savePlanner(){
  if(useFirebase&&db){db.ref('planner').set(planner)}
  else{localStorage.setItem('tokyoPlanner',JSON.stringify(planner))}
}

function updateSyncBadge(state){
  const el=document.getElementById('syncBadge');
  if(state==='online'){el.className='sync-badge online';el.innerHTML='🟢 실시간 동기화 중'}
  else if(state==='reconnecting'){el.className='sync-badge offline';el.innerHTML='🔄 재연결 중...'}
  else{el.className='sync-badge offline';el.innerHTML='📱 로컬 모드'}
}

    var txt='<div style="font-family:Gaegu,cursive;font-size:1.1rem;font-weight:700;color:#8B6F5A">'+(d.star?'⭐ ':'')+d.name+'</div><div style="font-size:.75rem;color:#8B7B6F;margin:2px 0">'+d.cat+' · '+(areaEmojis[d.area]||'')+' '+d.area+'</div><div style="font-size:.78rem;color:#8B7B6F;background:#FFF8F0;padding:3px 6px;border-radius:6px;margin-top:4px">'+d.note+'</div>'+(d.rating?'<div style="font-size:.75rem;margin-top:3px">⭐ '+d.rating+'</div>':'');
    var m=L.marker(ll,{icon:icon}).addTo(theMap).bindPopup(txt,{maxWidth:220});
    mapMarkers[d.id]=m;
  });

}

function flyToPlace(id){
  if(!theMap||!mapMarkers[id])return;
  // Switch to map tab
  document.querySelectorAll('.main-tab').forEach(function(t){t.classList.remove('active')});
  document.querySelector('[data-panel="map"]').classList.add('active');
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
  document.getElementById('panel-map').classList.add('active');
  // Fly to marker and open popup
  setTimeout(function(){
    theMap.invalidateSize();
    var m=mapMarkers[id];
    theMap.flyTo(m.getLatLng(),16,{duration:0.8});
    setTimeout(function(){m.openPopup()},900);
  },100);
}

function mapZoomArea(area){
  if(!theMap)return;
  var pts=[];
  DATA.forEach(function(d){
    if(d.area!==area)return;
    var ll=PLACE_LL[d.name];
    if(ll)pts.push(ll);
  });
  if(pts.length){
    var bounds=L.latLngBounds(pts);
    theMap.fitBounds(bounds.pad(0.3),{maxZoom:15});
  }
  document.getElementById('realMap').scrollIntoView({behavior:'smooth'});
}

var reviews={};

function initReviewSync(){
  if(!useFirebase||!db)return;
  db.ref('reviews').on('value',function(snap){
    reviews=snap.val()||{};
    renderReview();
  });
}
// call after firebase init
var origInitFB=initFirebase;
initFirebase=function(){
  origInitFB();
  setTimeout(initReviewSync,500);
};
// also try now
setTimeout(initReviewSync,2000);

function saveReviews(){
  if(useFirebase&&db){db.ref('reviews').set(reviews)}
  else{localStorage.setItem('tokyoReviews',JSON.stringify(reviews))}
}

function toggleReviewEaten(name){
  if(!reviews[name])reviews[name]={eaten:false,stars:0,comments:[]};
  if(!reviews[name].comments)reviews[name].comments=[];
  reviews[name].eaten=!reviews[name].eaten;
  if(!reviews[name].eaten){reviews[name].stars=0;reviews[name].comments=[];}
  saveReviews();renderReview();
}

function setReviewStars(name,stars){
  if(!reviews[name])reviews[name]={eaten:true,stars:0,comments:[]};
  if(!reviews[name].comments)reviews[name].comments=[];
  reviews[name].stars=stars;
  saveReviews();renderReview();
}

function setReviewComment(name,val){
  if(!reviews[name])reviews[name]={eaten:true,stars:0,comments:[]};
  // migrate old single comment
  if(reviews[name].comment&&!reviews[name].comments){
    reviews[name].comments=[{nick:'',text:reviews[name].comment}];
    delete reviews[name].comment;
  }
  saveReviews();
}

function addReviewComment(name){
  var nickEl=document.getElementById('rnick-'+CSS.escape(name));
  var textEl=document.getElementById('rtext-'+CSS.escape(name));
  if(!nickEl||!textEl)return;
  var nick=nickEl.value.trim();
  var text=textEl.value.trim();
  if(!nick||!text)return;
  if(!reviews[name])reviews[name]={eaten:true,stars:0,comments:[]};
  if(!reviews[name].comments)reviews[name].comments=[];
  reviews[name].comments.push({nick:nick,text:text,time:new Date().toLocaleDateString('ko-KR')});
  // save nickname for next time
  localStorage.setItem('tokyoNick',nick);
  nickEl.value=nick;
  textEl.value='';
  saveReviews();renderReview();
}

function removeReviewComment(name,ci){
  if(!reviews[name]||!reviews[name].comments)return;
  reviews[name].comments.splice(ci,1);
  saveReviews();renderReview();
}

function addManualReview(){
  var input=document.getElementById('manualReviewInput');
  var name=input.value.trim();
  if(!name)return;
  if(!reviews[name])reviews[name]={eaten:true,stars:0,comments:[],manual:true};
  else reviews[name].eaten=true;
  input.value='';
  saveReviews();renderReview();
}

function renderReview(){
  var el=document.getElementById('reviewContent');
  if(!el)return;
  var savedNick=localStorage.getItem('tokyoNick')||'';
  
  // Collect all unique names from planner meals (not 메모)
  var plannerItems={};
  if(planner&&planner.length){
    planner.forEach(function(day,di){
      ['점심','저녁','간식','관광'].forEach(function(meal){
        var items=day.meals[meal]||[];
        items.forEach(function(name){
          if(!plannerItems[name])plannerItems[name]={days:[]};
          plannerItems[name].days.push(day.day+'일차 '+meal);
        });
      });
    });
  }
  
  // Also add manual reviews that aren't in planner
  for(var rname in reviews){
    if(!plannerItems[rname]&&reviews[rname]){
      plannerItems[rname]={days:['직접 추가']};
    }
  }
  
  var names=Object.keys(plannerItems);
  if(!names.length){
    el.innerHTML='<div class="review-empty">📅 일정에 가게를 추가하거나 위에서 직접 입력해보세요!</div>';
    return;
  }
  
  var html='';
  names.forEach(function(name){
    var r=reviews[name]||{eaten:false,stars:0,comments:[]};
    // migrate old format
    if(r.comment&&!r.comments){r.comments=[{nick:'',text:r.comment}];delete r.comment;}
    if(!r.comments)r.comments=[];
    var d=DATA.find(function(dd){return dd.name===name});
    var dayInfo=plannerItems[name].days.join(', ');
    var eName=name.replace(/'/g,"\\'");
    
    html+='<div class="review-card">';
    html+='<div class="review-card-top">';
    html+='<div style="cursor:pointer;font-size:1.2rem" onclick="toggleReviewEaten(\''+eName+'\')">'+(r.eaten?'✅':'⬜')+'</div>';
    html+='<div><div class="review-card-name">'+name+'</div>';
    html+='<div class="review-card-area">'+(d?((areaEmojis[d.area]||'')+' '+d.area+' · '+d.cat):'')+'  ·  '+dayInfo+'</div></div>';
    html+='</div>';
    
    if(r.eaten){
      // Stars
      html+='<div class="review-stars">';
      for(var s=1;s<=5;s++){
        html+='<span class="review-star" onclick="setReviewStars(\''+eName+'\','+s+')">'+(s<=r.stars?'⭐':'☆')+'</span>';
      }
      html+='</div>';
      // Existing comments
      if(r.comments.length){
        r.comments.forEach(function(c,ci){
          html+='<div style="display:flex;align-items:flex-start;gap:.4rem;margin-bottom:.4rem;padding:.4rem .6rem;background:var(--cream);border-radius:8px">';
          html+='<span style="font-family:Gaegu,cursive;font-weight:700;color:var(--coral);flex-shrink:0;font-size:.85rem">'+(c.nick||'익명')+'</span>';

          if(c.time)html+='<span style="font-size:.65rem;color:var(--text-light);flex-shrink:0">'+c.time+'</span>';
          html+='<span style="cursor:pointer;font-size:.65rem;color:var(--text-light)" onclick="removeReviewComment(\''+eName+'\','+ci+')">✕</span>';
          html+='</div>';
        });
      }
      // Add new comment input
      html+='<div style="display:flex;gap:.3rem;margin-top:.4rem;flex-wrap:wrap">';
      html+='<input id="rnick-'+name+'" value="'+savedNick.replace(/"/g,'&quot;')+'" placeholder="닉네임" style="width:70px;padding:.35rem .5rem;border:1.5px solid var(--pink-light);border-radius:8px;font-size:.78rem;outline:none;font-family:Noto Sans KR,sans-serif;flex-shrink:0">';
      html+='<input id="rtext-'+name+'" placeholder="한줄평 입력..." style="flex:1;min-width:100px;padding:.35rem .5rem;border:1.5px solid var(--pink-light);border-radius:8px;font-size:.78rem;outline:none;font-family:Noto Sans KR,sans-serif">';
      html+='<button onclick="addReviewComment(\''+eName+'\')" style="padding:.35rem .6rem;border-radius:8px;border:none;background:var(--coral);color:#fff;font-size:.75rem;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0">등록</button>';
      html+='</div>';
    }else{
      html+='<div style="font-size:.8rem;color:var(--text-light);font-style:italic">체크하면 별점과 후기를 남길 수 있어요</div>';
    }
    
    html+='</div>';
  });
  
  el.innerHTML=html;
}

// Photo fullscreen

  document.getElementById('photoOverlay').classList.add('show');
}

// ===== IMAGE CROP =====
var cropCallback=null;
var cropImg=new Image();
var cropX=0,cropY=0,cropSize=200,cropDragging=false,cropStartX=0,cropStartY=0;

function openCrop(file,ci){
  var reader=new FileReader();
  reader.onload=function(e){
    cropImg.onload=function(){
      cropCallback=ci;
      var modal=document.getElementById('cropModal');
      var canvas=document.getElementById('cropCanvas');
      var ctx=canvas.getContext('2d');
      // Fit image in canvas
      var maxW=Math.min(window.innerWidth-40,500);
      var scale=maxW/cropImg.width;
      if(scale>1)scale=1;
      canvas.width=cropImg.width*scale;
      canvas.height=cropImg.height*scale;
      cropSize=Math.min(canvas.width,canvas.height)*0.7;
      cropX=(canvas.width-cropSize)/2;
      cropY=(canvas.height-cropSize)/2;
      drawCrop(ctx,scale);
      modal.classList.add('show');
      
      // Touch/mouse events
      canvas.onmousedown=canvas.ontouchstart=function(ev){
        ev.preventDefault();
        var rect=canvas.getBoundingClientRect();
        var px=(ev.touches?ev.touches[0].clientX:ev.clientX)-rect.left;
        var py=(ev.touches?ev.touches[0].clientY:ev.clientY)-rect.top;
        cropDragging=true;cropStartX=px-cropX;cropStartY=py-cropY;
      };
      canvas.onmousemove=canvas.ontouchmove=function(ev){
        if(!cropDragging)return;ev.preventDefault();
        var rect=canvas.getBoundingClientRect();
        var px=(ev.touches?ev.touches[0].clientX:ev.clientX)-rect.left;
        var py=(ev.touches?ev.touches[0].clientY:ev.clientY)-rect.top;
        cropX=Math.max(0,Math.min(canvas.width-cropSize,px-cropStartX));
        cropY=Math.max(0,Math.min(canvas.height-cropSize,py-cropStartY));
        drawCrop(ctx,scale);
      };
      canvas.onmouseup=canvas.ontouchend=function(){cropDragging=false};
    };
    cropImg.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function drawCrop(ctx,scale){
  ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
  ctx.drawImage(cropImg,0,0,ctx.canvas.width,ctx.canvas.height);
  // Darken outside
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(0,0,ctx.canvas.width,cropY);
  ctx.fillRect(0,cropY+cropSize,ctx.canvas.width,ctx.canvas.height-cropY-cropSize);
  ctx.fillRect(0,cropY,cropX,cropSize);
  ctx.fillRect(cropX+cropSize,cropY,ctx.canvas.width-cropX-cropSize,cropSize);
  // Border
  ctx.strokeStyle='#fff';ctx.lineWidth=2;
  ctx.strokeRect(cropX,cropY,cropSize,cropSize);
  // Grid lines
  ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(cropX+cropSize/3,cropY);ctx.lineTo(cropX+cropSize/3,cropY+cropSize);
  ctx.moveTo(cropX+cropSize*2/3,cropY);ctx.lineTo(cropX+cropSize*2/3,cropY+cropSize);
  ctx.moveTo(cropX,cropY+cropSize/3);ctx.lineTo(cropX+cropSize,cropY+cropSize/3);
  ctx.moveTo(cropX,cropY+cropSize*2/3);ctx.lineTo(cropX+cropSize,cropY+cropSize*2/3);
  ctx.stroke();
}

function applyCrop(){
  var canvas=document.getElementById('cropCanvas');
  var scale=cropImg.width/canvas.width;
  var out=document.createElement('canvas');
  out.width=400;out.height=400;
  var ctx=out.getContext('2d');
  ctx.drawImage(cropImg,cropX*scale,cropY*scale,cropSize*scale,cropSize*scale,0,0,400,400);
  var data=out.toDataURL('image/jpeg',0.7);
  document.getElementById('cropModal').classList.remove('show');
  if(!window._croppedImgs)window._croppedImgs=[];
  window._croppedImgs.push(data);
  window._croppedCI=cropCallback;
  setTimeout(processNextCrop,200);
}

function cancelCrop(){
  document.getElementById('cropModal').classList.remove('show');
}

function processNextCrop(){
  if(!window._cropQueue||!window._cropQueue.length){
    var ci=window._cropQueueCI;
    var container=document.getElementById('spreview-'+ci);
    if(container&&window._croppedImgs){
      container.innerHTML='';
      window._croppedImgs.forEach(function(src){
        var img=document.createElement('img');
        img.src=src;img.style.cssText='width:40px;height:40px;object-fit:cover;border-radius:6px;margin:2px';
        container.appendChild(img);
      });
    }
    return;
  }
  openCrop(window._cropQueue.shift(),window._cropQueueCI);
}

var souvenirs=[];
var souvView='card';

function setSouvView(v){
  souvView=v;
  document.querySelectorAll('.souv-view-btn').forEach(function(b){b.classList.remove('active')});
  if(event&&event.target)event.target.classList.add('active');
  renderSouvenir();
}

function initSouvenirSync(){
  if(!useFirebase||!db)return;
  db.ref('souvenirs').on('value',function(snap){
    souvenirs=snap.val()||[];
    renderSouvenir();
  });
}
setTimeout(initSouvenirSync,2500);

function saveSouvenirs(){
  if(useFirebase&&db){db.ref('souvenirs').set(souvenirs)}
  else{localStorage.setItem('tokyoSouvenirs',JSON.stringify(souvenirs))}
}

function addSouvenirCategory(){
  var input=document.getElementById('newCategoryInput');
  var name=input.value.trim();
  if(!name)return;
  souvenirs.push({name:name,items:[]});
  input.value='';
  saveSouvenirs();renderSouvenir();
}

function removeSouvenirCategory(ci){
  if(!confirm(souvenirs[ci].name+' 카테고리를 삭제할까요?'))return;
  souvenirs.splice(ci,1);
  saveSouvenirs();renderSouvenir();
}

function addSouvenirItem(ci){
  var nick=document.getElementById('snick-'+ci);
  var text=document.getElementById('stext-'+ci);
  if(!nick||!text)return;
  var nickVal=nick.value.trim()||'익명';
  var textVal=text.value.trim();
  if(!textVal)return;
  localStorage.setItem('tokyoNick',nickVal);
  var imgs=[];
  if(window._croppedImgs&&window._croppedImgs.length&&window._croppedCI===ci){
    imgs=window._croppedImgs.slice();
    window._croppedImgs=[];
  }
  if(!souvenirs[ci].items)souvenirs[ci].items=[];
  souvenirs[ci].items.push({nick:nickVal,text:textVal,imgs:imgs,img:imgs.length?imgs[0]:null,time:new Date().toLocaleDateString('ko-KR')});
  text.value='';
  var file=document.getElementById('sfile-'+ci);if(file)file.value='';
  var container=document.getElementById('spreview-'+ci);if(container)container.innerHTML='';
  saveSouvenirs();renderSouvenir();
}

function removeSouvenirItem(ci,ii){
  souvenirs[ci].items.splice(ii,1);
  saveSouvenirs();renderSouvenir();
}

function previewSouvenirPhoto(ci){
  var file=document.getElementById('sfile-'+ci);
  if(!file||!file.files||!file.files.length)return;
  window._croppedImgs=[];
  window._croppedCI=ci;
  window._cropQueue=Array.from(file.files);
  window._cropQueueCI=ci;
  processNextCrop();
}

function getItemImgs(item){
  if(item.imgs&&item.imgs.length)return item.imgs;
  if(item.img)return[item.img];
  return[];
}

function renderSouvenir(){
  var el=document.getElementById('souvenirContent');
  if(!el)return;
  var savedNick=localStorage.getItem('tokyoNick')||'';
  var searchEl=document.getElementById('souvSearchInput');
  var q=searchEl?searchEl.value.trim().toLowerCase():'';
  if(!souvenirs||!souvenirs.length){
    el.innerHTML='<div class="review-empty">🛍️ 위에서 카테고리를 추가해보세요!<br><small style="font-size:.9rem">예: 편의점-로손, 돈키호테, 약국</small></div>';
    return;
  }
  var html='';
  souvenirs.forEach(function(cat,ci){
    var items=cat.items||[];
    var catMatch=cat.name.toLowerCase().indexOf(q)!==-1;
    var filtered=q?items.filter(function(item){
      return catMatch||item.text.toLowerCase().indexOf(q)!==-1||item.nick.toLowerCase().indexOf(q)!==-1;
    }):items;
    if(q&&!filtered.length&&!catMatch)return;
    html+='<div class="souv-cat">';
    html+='<div class="souv-cat-title"><span>🏷️ '+cat.name+'</span><span style="font-size:.75rem;cursor:pointer;color:var(--text-light)" onclick="removeSouvenirCategory('+ci+')">✕ 삭제</span></div>';
    var displayItems=q?filtered:items;

    if(souvView==='grid'){
      // Grid: photos only
      html+='<div class="souv-grid">';
      displayItems.forEach(function(item){
        var imgs=getItemImgs(item);
        imgs.forEach(function(src){
          html+='<div class="souv-grid-item">';
          html+='<img src="'+src+'" onclick="showPhoto(this.src)">';
          html+='<div class="souv-grid-label">'+item.nick+' · '+item.text.substring(0,20)+'</div>';
          html+='</div>';
        });
        if(!imgs.length){
          html+='<div class="souv-grid-item" style="background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:.75rem;color:var(--text-light)">📝 '+item.text.substring(0,15)+'</div>';
        }
      });
      html+='</div>';
    }else if(souvView==='text'){
      // Text: compact list
      displayItems.forEach(function(item,ii){
        html+='<div class="souv-text-item">';
        html+='<span style="font-family:Gaegu,cursive;font-weight:700;color:var(--coral);flex-shrink:0;font-size:.8rem">'+item.nick+'</span>';
        html+='<span style="flex:1;color:var(--text)">'+item.text.replace(/</g,'&lt;')+'</span>';
        var imgs=getItemImgs(item);
        if(imgs.length)html+='<span style="font-size:.7rem;color:var(--text-light)">📷'+imgs.length+'</span>';
        html+='<span style="font-size:.65rem;color:var(--text-light);flex-shrink:0">'+(item.time||'')+'</span>';
        html+='<span style="cursor:pointer;font-size:.6rem;color:var(--text-light)" onclick="removeSouvenirItem('+ci+','+ii+')">✕</span>';
        html+='</div>';
      });
    }else{
      // Card: default full view
      displayItems.forEach(function(item,ii){
        html+='<div class="souv-item">';
        var imgs=getItemImgs(item);
        if(imgs.length){
          html+='<div style="display:flex;flex-wrap:wrap;gap:4px">';
          imgs.forEach(function(src){
            html+='<img src="'+src+'" onclick="showPhoto(this.src)" style="width:'+(imgs.length>1?'120px':'280px')+';max-width:100%;height:auto;border-radius:8px;border:1.5px solid var(--pink-light);cursor:pointer">';
          });
          html+='</div>';
        }
        html+='<div style="flex:1;min-width:120px"><div class="souv-item-nick">'+item.nick+(item.time?' · '+item.time:'')+'<span style="cursor:pointer;font-size:.6rem;color:var(--text-light);margin-left:.4rem" onclick="removeSouvenirItem('+ci+','+ii+')">✕</span></div>';
        html+='<div class="souv-item-text">'+item.text.replace(/</g,'&lt;').replace(/\n/g,'<br>')+'</div>';
        html+='</div></div>';
      });
    }
    // Add item form
    html+='<div class="souv-add-row">';
    html+='<input id="snick-'+ci+'" value="'+savedNick.replace(/"/g,'&quot;')+'" placeholder="닉네임" style="width:65px">';
    html+='<textarea id="stext-'+ci+'" placeholder="상품명, 가격, 후기..." style="flex:1;min-width:120px;min-height:36px;resize:vertical"></textarea>';
    html+='<label class="souv-photo-label">📷 사진<input type="file" id="sfile-'+ci+'" accept="image/*" multiple style="display:none" onchange="previewSouvenirPhoto('+ci+')"></label>';
    html+='<div id="spreview-'+ci+'" style="display:flex;flex-wrap:wrap;gap:2px"></div>';
    html+='<button onclick="addSouvenirItem('+ci+')" style="padding:.35rem .6rem;border-radius:8px;border:none;background:var(--coral);color:#fff;font-size:.75rem;font-weight:700;cursor:pointer">등록</button>';
    html+='</div>';
    html+='</div>';
  });
  el.innerHTML=html;
}

// Save data to localStorage as offline backup
function saveOfflineBackup(){
  try{
    localStorage.setItem('tokyoVisited',JSON.stringify(visited));
    localStorage.setItem('tokyoPlanner',JSON.stringify(planner));
    localStorage.setItem('tokyoReviews',JSON.stringify(reviews));
    localStorage.setItem('tokyoSouvenirs',JSON.stringify(souvenirs));
  }catch(e){}
}
// Backup every 10 seconds
setInterval(saveOfflineBackup,10000);

// If Firebase fails, load from localStorage
setTimeout(function(){
  if(!useFirebase){
    try{visited=JSON.parse(localStorage.getItem('tokyoVisited')||'{}');}catch(e){visited={}}
    try{
      planner=JSON.parse(localStorage.getItem('tokyoPlanner')||'null');
      if(!planner)planner=[{day:1,meals:{점심:[],저녁:[],간식:[],관광:[],메모:[]}},{day:2,meals:{점심:[],저녁:[],간식:[],관광:[],메모:[]}},{day:3,meals:{점심:[],저녁:[],간식:[],관광:[],메모:[]}}];
      planner.forEach(function(d){if(!d.meals)d.meals={};if(!d.meals['점심'])d.meals['점심']=[];if(!d.meals['저녁'])d.meals['저녁']=[];if(!d.meals['간식'])d.meals['간식']=[];if(!d.meals['관광'])d.meals['관광']=[];if(!d.meals['메모'])d.meals['메모']=[];});
    }catch(e){}
    try{reviews=JSON.parse(localStorage.getItem('tokyoReviews')||'{}');}catch(e){reviews={}}
    try{souvenirs=JSON.parse(localStorage.getItem('tokyoSouvenirs')||'[]');}catch(e){souvenirs=[]}
    renderPlanner();renderList();renderReview();renderSouvenir();
  }
},3000);

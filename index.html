<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗼 도쿄 여행 가이드 🍡</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{--cream:#FFF8F0;--pink:#FFB5B5;--pink-light:#FFE0E0;--peach:#FFDAB3;--mint:#B5E8D5;--mint-light:#E0F5EC;--sky:#B5D8F7;--sky-light:#E0EFFE;--lavender:#D4BEF0;--lavender-light:#EDE0FA;--yellow:#FFE9A0;--yellow-light:#FFF4D1;--coral:#FF8C7C;--brown:#8B6F5A;--brown-light:#A68B7B;--text:#5A4A3F;--text-light:#8B7B6F;--white:#fff;--shadow:rgba(139,111,90,.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--cream);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-weight:400;line-height:1.7;overflow-x:hidden}
.float-deco{position:fixed;pointer-events:none;z-index:0;opacity:.12;font-size:3rem;animation:floaty 8s ease-in-out infinite}
.float-deco:nth-child(1){top:10%;left:5%}.float-deco:nth-child(2){top:30%;right:8%;animation-delay:2s}.float-deco:nth-child(3){top:55%;left:3%;animation-delay:4s}.float-deco:nth-child(4){top:75%;right:5%;animation-delay:6s}.float-deco:nth-child(5){top:90%;left:10%;animation-delay:1s}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-20px) rotate(5deg)}}

/* Hero */
.hero{text-align:center;padding:3rem 1.5rem 2rem;background:linear-gradient(180deg,var(--pink-light) 0%,var(--cream) 100%)}
.hero-emoji{font-size:3.5rem;display:block;margin-bottom:.3rem;animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.hero h1{font-family:'Gaegu',cursive;font-size:2.6rem;font-weight:700;color:var(--brown);letter-spacing:-1px}
.hero h1 span{color:var(--coral)}
.hero-sub{font-family:'Gaegu',cursive;font-size:1.2rem;color:var(--brown-light);margin-top:.3rem}

/* Tabs for sections */
.main-tabs{display:flex;justify-content:center;gap:.5rem;padding:1rem;background:var(--cream);position:sticky;top:0;z-index:200;border-bottom:2px solid var(--pink-light);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);background:rgba(255,248,240,.92)}
.main-tab{font-family:'Gaegu',cursive;font-size:1.1rem;font-weight:700;padding:.5rem 1.2rem;border-radius:100px;border:2px solid var(--pink-light);background:var(--white);color:var(--brown);cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1)}
.main-tab:hover,.main-tab.active{background:var(--coral);border-color:var(--coral);color:var(--white);transform:translateY(-2px);box-shadow:0 4px 12px rgba(255,140,124,.3)}

.panel{display:none}.panel.active{display:block}

/* ===== MAP PANEL ===== */
.map-container{position:relative;max-width:960px;margin:1.5rem auto;padding:0 1rem}
#realMap{width:100%;height:55vh;min-height:350px;max-height:500px;border-radius:20px;border:2px solid var(--pink-light);overflow:hidden;box-shadow:0 4px 20px var(--shadow);z-index:1;background:#e8e0d8}
.leaflet-popup-content-wrapper{border-radius:12px!important;font-family:'Noto Sans KR',sans-serif!important;box-shadow:0 4px 15px rgba(0,0,0,.12)!important}
.leaflet-popup-content{margin:10px 14px!important;font-size:.85rem;line-height:1.5}
.map-popup-name{font-family:'Gaegu',cursive;font-size:1.15rem;font-weight:700;color:#8B6F5A;margin-bottom:2px}
.map-popup-cat{display:inline-block;font-size:.68rem;padding:1px 7px;border-radius:100px;margin-bottom:4px}
.map-popup-note{font-size:.78rem;color:#8B7B6F}
.map-popup-btn{display:inline-block;margin-top:6px;font-family:'Gaegu',cursive;font-size:.85rem;font-weight:700;padding:3px 12px;border-radius:100px;background:#FF8C7C;color:#fff;cursor:pointer;border:none;transition:all .2s}
.map-popup-btn:hover{background:#E85D4A}
.custom-marker{display:flex;align-items:center;justify-content:center;border-radius:50%;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.25);font-size:11px;color:#fff;font-weight:700;cursor:pointer;transition:transform .2s}
.custom-marker:hover{transform:scale(1.2)}
.map-legend{position:absolute;bottom:1.5rem;left:1.5rem;z-index:400;background:rgba(255,248,240,.95);backdrop-filter:blur(8px);border-radius:14px;padding:.7rem 1rem;border:2px solid var(--pink-light);box-shadow:0 2px 12px var(--shadow);display:flex;flex-wrap:wrap;gap:.4rem .8rem;max-width:calc(100% - 3rem);font-size:.75rem}
.map-legend-item{display:flex;align-items:center;gap:.3rem;cursor:pointer;opacity:1;transition:opacity .2s}
.map-legend-item:hover{opacity:.7}
.map-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ===== PLANNER PANEL ===== */
.planner-wrap{max-width:900px;margin:1.5rem auto;padding:0 1rem}
.planner-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.planner-title{font-family:'Gaegu',cursive;font-size:1.8rem;font-weight:700;color:var(--brown)}
.planner-actions{display:flex;gap:.4rem}
.planner-btn{font-family:'Gaegu',cursive;font-size:.95rem;font-weight:700;padding:.4rem .9rem;border-radius:100px;border:2px solid var(--pink-light);background:var(--white);color:var(--brown);cursor:pointer;transition:all .25s}
.planner-btn:hover{background:var(--pink);color:var(--white);border-color:var(--pink)}
.planner-btn.danger:hover{background:var(--coral);border-color:var(--coral);color:var(--white)}
.day-block{background:var(--white);border-radius:16px;padding:1.2rem;margin-bottom:1rem;border:2px solid var(--pink-light);box-shadow:0 2px 12px var(--shadow)}
.day-title{font-family:'Gaegu',cursive;font-size:1.4rem;font-weight:700;color:var(--coral);margin-bottom:.8rem;display:flex;align-items:center;gap:.4rem}
.meal-row{display:flex;align-items:center;gap:.6rem;padding:.6rem .8rem;border-radius:12px;margin-bottom:.5rem;background:var(--cream);min-height:52px;transition:all .2s}
.meal-row:hover{background:var(--pink-light)}
.meal-row.dragover{border:2px dashed var(--coral);background:var(--yellow-light)}
.meal-label{font-family:'Gaegu',cursive;font-weight:700;font-size:1rem;color:var(--brown);min-width:42px;flex-shrink:0}
.meal-slot{flex:1;min-height:32px;border-radius:8px;display:flex;align-items:center;flex-wrap:wrap;gap:.3rem}
.meal-chip{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .7rem;border-radius:100px;font-size:.82rem;font-weight:500;background:var(--white);border:1.5px solid var(--pink-light);color:var(--brown);animation:chipIn .3s ease}
@keyframes chipIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.meal-chip .chip-remove{cursor:pointer;font-size:.7rem;color:var(--text-light);margin-left:.1rem;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.meal-chip .chip-remove:hover{background:var(--coral);color:var(--white)}
.meal-empty{font-size:.82rem;color:var(--text-light);font-style:italic}
.add-to-meal-btn{font-size:.65rem;padding:.2rem .5rem;border-radius:100px;border:1.5px solid var(--mint);background:var(--mint-light);color:#408060;cursor:pointer;font-weight:500;transition:all .2s;white-space:nowrap}
.add-to-meal-btn:hover{background:var(--mint);color:var(--white)}

/* Meal picker modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.show{display:flex}
.modal{background:var(--cream);border-radius:20px;max-width:500px;width:100%;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;border:2px solid var(--pink-light);box-shadow:0 12px 40px rgba(0,0,0,.15)}
.modal-head{padding:1rem 1.2rem;border-bottom:2px solid var(--pink-light);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-family:'Gaegu',cursive;font-size:1.3rem;font-weight:700;color:var(--brown)}
.modal-close{width:30px;height:30px;border-radius:50%;border:none;background:var(--pink-light);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:var(--coral);color:var(--white)}
.modal-search{padding:.8rem 1.2rem;border-bottom:1px solid var(--pink-light)}
.modal-search input{width:100%;padding:.5rem .8rem;border-radius:100px;border:2px solid var(--pink-light);font-size:.9rem;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border .2s}
.modal-search input:focus{border-color:var(--coral)}
.modal-list{flex:1;overflow-y:auto;padding:.5rem}
.modal-item{display:flex;align-items:center;justify-content:space-between;padding:.6rem .8rem;border-radius:10px;cursor:pointer;transition:all .15s;gap:.5rem}
.modal-item:hover{background:var(--pink-light)}
.modal-item-name{font-size:.9rem;font-weight:500;flex:1}
.modal-item-area{font-size:.72rem;color:var(--text-light);flex-shrink:0}
.modal-item-cat{font-size:.68rem;padding:.15rem .45rem;border-radius:100px;flex-shrink:0}

/* ===== LIST PANEL ===== */
.nav-wrap{padding:.8rem 1rem;border-bottom:2px solid var(--pink-light)}
.nav-pills{display:flex;gap:.5rem;overflow-x:auto;scrollbar-width:none;max-width:900px;margin:0 auto;padding-bottom:4px}
.nav-pills::-webkit-scrollbar{display:none}
.nav-pill{flex-shrink:0;padding:.4rem .9rem;border-radius:100px;border:2px solid var(--pink-light);background:var(--white);font-family:'Gaegu',cursive;font-size:.95rem;font-weight:700;color:var(--brown);cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
.nav-pill:hover,.nav-pill.active{background:var(--pink);border-color:var(--pink);color:var(--white);transform:translateY(-2px);box-shadow:0 4px 12px rgba(255,181,181,.4)}
.filter-wrap{max-width:900px;margin:1rem auto 0;padding:0 1.5rem;display:flex;gap:.4rem;flex-wrap:wrap}
.filter-pill{padding:.25rem .7rem;border-radius:100px;border:1.5px solid var(--peach);background:var(--white);font-size:.75rem;color:var(--brown-light);cursor:pointer;transition:all .25s}
.filter-pill:hover,.filter-pill.active{background:var(--peach);color:var(--white);border-color:var(--peach)}
.progress-wrap{max-width:900px;margin:0 auto;padding:0 1.5rem;margin-top:1rem}
.progress-label{font-family:'Gaegu',cursive;font-size:1rem;color:var(--brown-light);margin-bottom:.4rem}
.progress-bar{height:10px;background:var(--pink-light);border-radius:100px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--coral));border-radius:100px;transition:width .5s cubic-bezier(.34,1.56,.64,1)}
.content{max-width:900px;margin:0 auto;padding:1.5rem;position:relative;z-index:1}
.section{margin-bottom:2.5rem}
.section-header{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:3px dashed var(--pink-light)}
.section-emoji{font-size:1.6rem;animation:wiggle 3s ease-in-out infinite}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
.section-title{font-family:'Gaegu',cursive;font-size:1.5rem;font-weight:700;color:var(--brown)}
.section-count{font-family:'Gaegu',cursive;font-size:.85rem;color:var(--white);background:var(--pink);padding:.1rem .55rem;border-radius:100px}
.cards{display:grid;grid-template-columns:1fr;gap:.7rem}
.card{background:var(--white);border-radius:14px;padding:.9rem 2.8rem .9rem 1.1rem;border:2px solid transparent;transition:all .3s cubic-bezier(.34,1.56,.64,1);cursor:default;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:4px 0 0 4px;transition:all .3s}
.card[data-cat="라멘"]::before,.card[data-cat="츠케멘"]::before{background:var(--coral)}.card[data-cat="야끼니꾸"]::before{background:#E85D4A}.card[data-cat="꼬치"]::before,.card[data-cat="닭꼬치"]::before{background:var(--peach)}.card[data-cat="돈가스"]::before,.card[data-cat="가츠동"]::before{background:var(--yellow)}.card[data-cat="스시"]::before,.card[data-cat="오마카세"]::before,.card[data-cat="회덮밥"]::before{background:var(--sky)}.card[data-cat="장어"]::before{background:var(--brown)}.card[data-cat="몬자야끼"]::before{background:var(--lavender)}.card[data-cat="함바그"]::before,.card[data-cat="떡갈비"]::before{background:#C97B5D}.card[data-cat="카레"]::before{background:#E8A840}.card[data-cat="카페"]::before,.card[data-cat="베이커리"]::before,.card[data-cat="디저트"]::before{background:var(--pink)}.card[data-cat="이자카야"]::before,.card[data-cat="술집"]::before{background:var(--mint)}.card[data-cat="기타"]::before{background:var(--text-light)}
.card:hover{transform:translateY(-2px);border-color:var(--pink-light);box-shadow:0 6px 20px var(--shadow)}
.card-top{display:flex;align-items:flex-start;gap:.5rem}
.card-name{font-family:'Gaegu',cursive;font-size:1.2rem;font-weight:700;color:var(--brown);line-height:1.3;flex:1;min-width:0;word-break:keep-all}
.card-name .star{color:var(--coral);font-size:.85rem}
.card-tag{flex-shrink:0;font-size:.7rem;padding:.18rem .55rem;border-radius:100px;font-weight:500}
.tag-ramen{background:#FFE5E2;color:#D4513E}.tag-yakiniku{background:#FFE0D5;color:#C44A38}.tag-kushiyaki{background:#FFF0DE;color:#B8802A}.tag-tonkatsu{background:#FFF5D5;color:#A88520}.tag-sushi{background:#E0EFFE;color:#4A7FB8}.tag-unagi{background:#F0E8DF;color:#6B5040}.tag-monja{background:#EDE0FA;color:#7B5BA8}.tag-hamburg{background:#F5E5DA;color:#956B50}.tag-curry{background:#FFF0D5;color:#A07020}.tag-cafe{background:#FFE0E0;color:#C86060}.tag-izakaya{background:#E0F5EC;color:#408060}.tag-other{background:#EDE8E3;color:#7B6B5F}
.card-meta{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.4rem}
.card-note{font-size:.78rem;color:var(--text-light);margin-top:.35rem;padding:.35rem .55rem;background:var(--cream);border-radius:8px;line-height:1.5}
.badge{display:inline-flex;align-items:center;gap:.2rem;padding:.12rem .45rem;border-radius:6px;font-size:.7rem}
.badge-rating{background:var(--yellow-light);color:#8B7020}.badge-reserve{background:var(--pink-light);color:#B85050}.badge-cash{background:var(--mint-light);color:#407050}.badge-hours{background:var(--sky-light);color:#4070A0}
.card-check{position:absolute;top:.7rem;right:.7rem;width:22px;height:22px;border-radius:6px;border:2px solid var(--pink-light);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;font-size:.7rem}
.card-check:hover{border-color:var(--pink)}.card-check.checked{background:var(--pink);border-color:var(--pink)}.card-check.checked::after{content:'✓';color:white;font-weight:700}
.card.visited{opacity:.5}.card.visited .card-name{text-decoration:line-through;text-decoration-color:var(--pink)}
.card .add-to-meal-btn{position:absolute;bottom:.6rem;right:.6rem}

.footer{text-align:center;padding:2.5rem 1.5rem;font-family:'Gaegu',cursive;color:var(--brown-light);font-size:1rem}
.footer-emoji{font-size:2rem;display:block;margin-bottom:.4rem}

/* Sync status */
.sync-badge{position:fixed;bottom:1rem;right:1rem;z-index:300;padding:.4rem .8rem;border-radius:100px;font-family:'Gaegu',cursive;font-size:.85rem;font-weight:700;box-shadow:0 2px 12px var(--shadow);display:flex;align-items:center;gap:.3rem;transition:all .3s}
.sync-badge.online{background:var(--mint);color:#2a6b4a}.sync-badge.offline{background:var(--yellow);color:#8B7020}

@media(min-width:600px){.cards{grid-template-columns:1fr 1fr}.hero h1{font-size:3rem}}
@media(max-width:599px){.hero h1{font-size:2rem}.hero-emoji{font-size:2.8rem}.section-title{font-size:1.2rem}.main-tab{font-size:.95rem;padding:.4rem .8rem}}
.card{opacity:0;transform:translateY(12px)}.card.show{opacity:1;transform:translateY(0);transition:all .35s ease}.card.visited.show{opacity:.5}
</style>
</head>
<body>
<div class="float-deco">🍣</div><div class="float-deco">🍡</div><div class="float-deco">🍜</div><div class="float-deco">🍙</div><div class="float-deco">🍰</div>

<div class="hero">
  <span class="hero-emoji">🗼</span>
  <h1>도쿄 <span>여행</span> 가이드</h1>
  <p class="hero-sub">우리의 먹방 쇼핑 미션 리스트 🍽️🛍️</p>
</div>

<div class="main-tabs">
  <button class="main-tab active" data-panel="map">🗺️ 지도</button>
  <button class="main-tab" data-panel="planner">📅 일정</button>
  <button class="main-tab" data-panel="list">📋 리스트</button>
</div>

<!-- MAP PANEL -->
<div class="panel active" id="panel-map">
  <div class="map-container">
    <div id="realMap"></div>
  </div>
</div>

<!-- PLANNER PANEL -->
<div class="panel" id="panel-planner">
  <div class="planner-wrap">
    <div class="planner-header">
      <span class="planner-title">📅 일정 플래너</span>
      <div class="planner-actions">
        <button class="planner-btn" onclick="addDay()">+ 일차 추가</button>
        <button class="planner-btn danger" onclick="clearPlanner()">초기화</button>
      </div>
    </div>
    <div id="plannerContent"></div>
  </div>
</div>

<!-- LIST PANEL -->
<div class="panel" id="panel-list">
  <div class="nav-wrap">
    <div class="nav-pills" id="navPills">
      <button class="nav-pill active" data-area="all">🗾 전체</button>
      <button class="nav-pill" data-area="신주쿠">🏙️ 신주쿠</button>
      <button class="nav-pill" data-area="시부야">🎯 시부야</button>
      <button class="nav-pill" data-area="오모테산도">🌿 오모테산도</button>
      <button class="nav-pill" data-area="하라주쿠">🌈 하라주쿠</button>
      <button class="nav-pill" data-area="에비스">🚃 에비스</button>
      <button class="nav-pill" data-area="롯폰기">🌙 롯폰기</button>
      <button class="nav-pill" data-area="긴자">💎 긴자·도쿄역</button>
      <button class="nav-pill" data-area="아사쿠사">⛩️ 아사쿠사</button>
      <button class="nav-pill" data-area="카페">☕ 카페</button>
      <button class="nav-pill" data-area="기타">📍 관광·쇼핑</button>
    </div>
  </div>
  <div class="filter-wrap" id="filterWrap">
    <button class="filter-pill active" data-filter="all">전체</button>
    <button class="filter-pill" data-filter="라멘">🍜 라멘</button>
    <button class="filter-pill" data-filter="야끼니꾸">🥩 야끼니꾸</button>
    <button class="filter-pill" data-filter="꼬치">🍢 꼬치</button>
    <button class="filter-pill" data-filter="돈가스">🍱 돈가스</button>
    <button class="filter-pill" data-filter="스시">🍣 스시</button>
    <button class="filter-pill" data-filter="장어">🐟 장어</button>
    <button class="filter-pill" data-filter="몬자야끼">🥞 몬자</button>
    <button class="filter-pill" data-filter="함바그">🍔 함바그</button>
    <button class="filter-pill" data-filter="카페">☕ 카페</button>
  </div>
  <div class="progress-wrap">
    <div class="progress-label" id="progressLabel">방문 체크: 0 / 0곳</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="content" id="content"></div>
</div>

<div class="footer"><span class="footer-emoji">🍙🍡🍣</span>도쿄에서 맛있는 거 많이 먹자!<br><small style="font-size:.8rem;color:var(--text-light)">실시간 동기화 — 친구들과 함께! 🔄</small></div>

<div class="sync-badge online" id="syncBadge">🟢 실시간 동기화 중</div>

function initFirebase(){
  try{
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.database();
    useFirebase=true;
    updateSyncBadge('online');

    db.ref('visited').on('value',snap=>{
      visited=snap.val()||{};
      renderList();
    });

    db.ref('planner').on('value',snap=>{
      planner=snap.val()||JSON.parse(JSON.stringify(defaultPlanner));
      planner.forEach(d=>{if(!d.meals)d.meals={점심:[],저녁:[],간식:[]}});
      renderPlanner();
    });

    // connection state
    db.ref('.info/connected').on('value',snap=>{
      updateSyncBadge(snap.val()?'online':'reconnecting');
    });
  }catch(e){
    console.error('Firebase error:',e);
    useFirebase=false;
    updateSyncBadge('offline');
    visited=JSON.parse(localStorage.getItem('tokyoVisited')||'{}');
    planner=JSON.parse(localStorage.getItem('tokyoPlanner')||'null')||JSON.parse(JSON.stringify(defaultPlanner));
    renderPlanner();renderList();
  }
}

function saveVisited(){
  if(useFirebase&&db){db.ref('visited').set(visited)}
  else{localStorage.setItem('tokyoVisited',JSON.stringify(visited))}
}

function savePlanner(){
  if(useFirebase&&db){db.ref('planner').set(planner)}
  else{localStorage.setItem('tokyoPlanner',JSON.stringify(planner))}
}

function updateSyncBadge(state){
  const el=document.getElementById('syncBadge');
  if(state==='online'){el.className='sync-badge online';el.innerHTML='🟢 실시간 동기화 중'}
  else if(state==='reconnecting'){el.className='sync-badge offline';el.innerHTML='🔄 재연결 중...'}
  else{el.className='sync-badge offline';el.innerHTML='📱 로컬 모드'}
}

const AREA_COLORS={"신주쿠":"#E85D4A","시부야":"#D84B94","오모테산도":"#2EAD6D","하라주쿠":"#8B5CF6","에비스":"#E8943A","롯폰기":"#3B82F6","긴자":"#D4960A","아사쿠사":"#DC4E4E","카페":"#C06090","기타":"#777"};

let map=null, markers=[], markerLayer=null, mapInited=false, legendAdded=false;

function renderMap(){
  const container=document.getElementById('realMap');
  if(!container)return;
  
  // If Leaflet not loaded yet, show fallback
  if(typeof L==='undefined'){
    container.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;font-family:Gaegu,cursive;font-size:1.2rem;color:#8B6F5A;text-align:center;padding:2rem">🗺️ 지도 로딩 중...<br><small style="font-size:.85rem;color:#A68B7B">인터넷 연결을 확인해주세요</small></div>';
    setTimeout(renderMap,1000);
    return;
  }

  if(map){map.remove();map=null;mapInited=false}
  
  // Remove old legend
  const oldLegend=document.querySelector('.map-legend');
  if(oldLegend)oldLegend.remove();

  map=L.map('realMap',{zoomControl:false,tap:true,touchZoom:true}).setView([35.6762,139.7350],12);
  L.control.zoom({position:'topright'}).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; OSM &copy; CARTO',maxZoom:19,subdomains:'abcd'
  }).addTo(map);

  markerLayer=L.layerGroup().addTo(map);
  markers=[];

  DATA.forEach(d=>{
    const ll=PLACE_LATLNG[d.name];
    if(!ll)return;
    const col=AREA_COLORS[d.area]||'#999';
    const icon=L.divIcon({
      className:'',
      html:'<div class="custom-marker" style="width:26px;height:26px;background:'+col+'">'+(d.star?'★':'')+'</div>',
      iconSize:[26,26],iconAnchor:[13,13]
    });
    const popup='<div class="map-popup-name">'+(d.star?'⭐ ':'')+d.name+'</div>'
      +'<span class="map-popup-cat card-tag '+d.tag+'">'+d.cat+'</span> <span style="font-size:.72rem;color:#8B7B6F">'+(areaEmojis[d.area]||'')+' '+d.area+'</span>'
      +'<div class="map-popup-note">'+d.note+'</div>'
      +(d.rating?'<span style="font-size:.75rem">⭐ '+d.rating+'</span>':'')
      +'<br><button class="map-popup-btn" onclick="mapGoToList(\''+d.area.replace(/'/g,"\\'")+'\')">📋 리스트에서 보기</button>';
    const m=L.marker(ll,{icon}).bindPopup(popup,{maxWidth:250});
    m._area=d.area;
    markers.push(m);
    markerLayer.addLayer(m);
  });

  // Legend
  const legendDiv=document.createElement('div');
  legendDiv.className='map-legend';
  areaOrder.filter(a=>a!=='기타').forEach(a=>{
    const col=AREA_COLORS[a];
    const cnt=DATA.filter(d=>d.area===a).length;
    legendDiv.innerHTML+='<div class="map-legend-item" onclick="mapZoomArea(\''+a+'\')"><div class="map-legend-dot" style="background:'+col+'"></div><span>'+(areaEmojis[a]||'')+' '+a+' ('+cnt+')</span></div>';
  });
  document.querySelector('.map-container').appendChild(legendDiv);
  
  mapInited=true;
  // Force correct size after a tick
  setTimeout(function(){if(map)map.invalidateSize()},200);
  setTimeout(function(){if(map)map.invalidateSize()},600);
}

function mapZoomArea(area){
  const pts=markers.filter(m=>m._area===area).map(m=>[m.getLatLng().lat,m.getLatLng().lng]);
  if(pts.length){
    const bounds=L.latLngBounds(pts);
    map.fitBounds(bounds.pad(0.3),{maxZoom:15});
  }
}

function mapGoToList(area){
  document.querySelectorAll('.main-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector('[data-panel="list"]').classList.add('active');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-list').classList.add('active');
  activeArea=area;
  document.querySelectorAll('.nav-pill').forEach(p=>{p.classList.remove('active');if(p.dataset.area===area)p.classList.add('active')});
  renderList();
  document.getElementById('panel-list').scrollIntoView({behavior:'smooth'});
}

// ===== PLANNER =====
function renderPlanner(){
  let html='';
  planner.forEach((day,di)=>{
    html+=`<div class="day-block"><div class="day-title">🗓️ ${day.day}일차
      <span style="margin-left:auto;font-size:.8rem;cursor:pointer;color:var(--text-light)" onclick="removeDay(${di})">✕ 삭제</span></div>`;
    ['점심','저녁','간식'].forEach(meal=>{
      const items=day.meals[meal]||[];
      const mealEmoji=meal==='점심'?'🌞':meal==='저녁'?'🌙':'🍡';
      html+=`<div class="meal-row"><span class="meal-label">${mealEmoji} ${meal}</span><div class="meal-slot">`;
      if(items.length===0) html+=`<span class="meal-empty">탭해서 추가...</span>`;
      items.forEach((name,ci)=>{
        html+=`<span class="meal-chip">${name}<span class="chip-remove" onclick="event.stopPropagation();removeMeal(${di},'${meal}',${ci})">✕</span></span>`;
      });
      html+=`</div><button class="add-to-meal-btn" onclick="event.stopPropagation();openModal(${di},'${meal}')">+ 추가</button></div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('plannerContent').innerHTML=html;
}

function addDay(){planner.push({day:planner.length+1,meals:{점심:[],저녁:[],간식:[]}});savePlanner();renderPlanner()}
function removeDay(di){if(planner.length<=1)return;planner.splice(di,1);planner.forEach((d,i)=>d.day=i+1);savePlanner();renderPlanner()}
function clearPlanner(){if(!confirm('일정을 초기화할까요?'))return;planner=[{day:1,meals:{점심:[],저녁:[],간식:[]}},{day:2,meals:{점심:[],저녁:[],간식:[]}},{day:3,meals:{점심:[],저녁:[],간식:[]}}];savePlanner();renderPlanner()}
function removeMeal(di,meal,ci){planner[di].meals[meal].splice(ci,1);savePlanner();renderPlanner()}
function addMealItem(name){
  if(!modalTarget)return;
  const{dayIdx,meal}=modalTarget;
  if(!planner[dayIdx].meals[meal])planner[dayIdx].meals[meal]=[];
  planner[dayIdx].meals[meal].push(name);
  savePlanner();renderPlanner();closeModal();
}

// Modal
function openModal(dayIdx,meal){
  modalTarget={dayIdx,meal};
  document.getElementById('modalTitle').textContent=`${planner[dayIdx].day}일차 ${meal} 추가 🍽️`;
  document.getElementById('modalSearch').value='';
  document.getElementById('mealModal').classList.add('show');
  renderModalList();
  setTimeout(()=>document.getElementById('modalSearch').focus(),100);
}
function closeModal(){document.getElementById('mealModal').classList.remove('show');modalTarget=null}
function renderModalList(){
  const q=document.getElementById('modalSearch').value.trim().toLowerCase();
  const foodOnly=DATA.filter(d=>!['기타'].includes(d.cat)||d.area!=='기타');
  const filtered=q?foodOnly.filter(d=>d.name.toLowerCase().includes(q)||d.area.includes(q)||d.cat.includes(q)):foodOnly;
  let html='';
  filtered.slice(0,40).forEach(d=>{
    html+=`<div class="modal-item" onclick="addMealItem('${d.name.replace(/'/g,"\\'")}')">
      <span class="modal-item-name">${d.star?'⭐ ':''}${d.name}</span>
      <span class="modal-item-area">${areaEmojis[d.area]||''} ${d.area}</span>
      <span class="modal-item-cat card-tag ${d.tag}">${d.cat}</span>
    </div>`;
  });
  if(!html) html='<div style="text-align:center;padding:2rem;color:var(--text-light)">검색 결과 없음 😅</div>';
  document.getElementById('modalList').innerHTML=html;
}
document.getElementById('mealModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});

// ===== LIST =====
function getBadgeHTML(b){
  if(b==="예약")return'<span class="badge badge-reserve">📝 예약</span>';
  if(b==="현금")return'<span class="badge badge-cash">💴 현금</span>';
  if(b==="추천")return'<span class="badge badge-rating">⭐ 추천</span>';
  if(b==="인기")return'<span class="badge badge-rating">🔥 인기</span>';
  if(b==="심야")return'<span class="badge badge-hours">🌙 심야</span>';
  if(b==="24h")return'<span class="badge badge-hours">⏰ 24h</span>';
  return'';
}

function renderList(){
  const content=document.getElementById('content');
  let html='';
  const areas=activeArea==='all'?areaOrder:[activeArea];
  areas.forEach(area=>{
    let items=DATA.filter(d=>d.area===area);
    if(activeFilter!=='all'){
      items=items.filter(d=>{
        if(activeFilter==="라멘")return d.cat==="라멘"||d.cat==="츠케멘";
        if(activeFilter==="꼬치")return d.cat==="꼬치"||d.cat==="닭꼬치";
        if(activeFilter==="돈가스")return d.cat==="돈가스"||d.cat==="가츠동";
        if(activeFilter==="스시")return d.cat==="스시"||d.cat==="오마카세"||d.cat==="회덮밥";
        if(activeFilter==="함바그")return d.cat==="함바그"||d.cat==="떡갈비";
        if(activeFilter==="카페")return d.cat==="카페"||d.cat==="베이커리"||d.cat==="디저트";
        return d.cat===activeFilter;
      });
    }
    if(!items.length)return;
    html+=`<div class="section"><div class="section-header"><span class="section-emoji">${areaEmojis[area]}</span><span class="section-title">${area==='긴자'?'긴자·도쿄역':area==='기타'?'관광·쇼핑':area}</span><span class="section-count">${items.length}</span></div><div class="cards">`;
    items.forEach((item,i)=>{
      const key=item.name,isV=visited[key];
      html+=`<div class="card ${isV?'visited':''}" data-cat="${item.cat}" id="card-${item.id}" style="animation-delay:${i*.04}s">
        <div class="card-check ${isV?'checked':''}" onclick="toggleVisit('${key.replace(/'/g,"\\'")}',this)"></div>
        <div class="card-top"><div><div class="card-name">${item.star?'<span class="star">★ </span>':''}${item.name}</div>
        <div class="card-meta">${item.rating?`<span class="badge badge-rating">⭐ ${item.rating}</span>`:''}${(item.badges||[]).map(getBadgeHTML).join('')}</div></div>
        <span class="card-tag ${item.tag}">${item.cat}</span></div>
        <div class="card-note">${item.note}</div></div>`;
    });
    html+='</div></div>';
  });
  if(!html)html='<div style="text-align:center;padding:3rem;font-family:Gaegu,cursive;font-size:1.2rem;color:var(--brown-light)">🔍 해당 조건의 맛집이 없어요!</div>';
  content.innerHTML=html;
  setTimeout(()=>document.querySelectorAll('.card').forEach(c=>c.classList.add('show')),50);
  updateProgress();
}

function toggleVisit(key,el){visited[key]=!visited[key];if(!visited[key])delete visited[key];saveVisited();el.classList.toggle('checked');el.closest('.card').classList.toggle('visited');updateProgress()}
function updateProgress(){const total=DATA.length,done=Object.values(visited).filter(Boolean).length;document.getElementById('progressLabel').textContent=`방문 체크: ${done} / ${total}곳 ${done===total?'🎉 컴플리트!':done>0?'💪 파이팅!':''}`;document.getElementById('progressFill').style.width=`${(done/total)*100}%`}

// Nav
document.getElementById('navPills').addEventListener('click',e=>{const p=e.target.closest('.nav-pill');if(!p)return;document.querySelectorAll('.nav-pill').forEach(x=>x.classList.remove('active'));p.classList.add('active');activeArea=p.dataset.area;renderList()});
document.getElementById('filterWrap').addEventListener('click',e=>{const p=e.target.closest('.filter-pill');if(!p)return;document.querySelectorAll('.filter-pill').forEach(x=>x.classList.remove('active'));p.classList.add('active');activeFilter=p.dataset.filter;renderList()});

// Main tabs
document.querySelectorAll('.main-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.main-tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-'+tab.dataset.panel).classList.add('active');
    if(tab.dataset.panel==='map'){
      if(!mapInited){setTimeout(renderMap,100)}
      else if(map){setTimeout(function(){map.invalidateSize()},150)}
    }
  });
});

// Init - delay map to ensure DOM is ready
renderPlanner();renderList();
setTimeout(renderMap,300);
</script>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tile Test</title>
</head>
<body style="padding:10px;font-family:monospace;font-size:13px">
<h3>타일 서버 테스트</h3>
<div id="log"></div>
<script>
var servers=[
  {name:'OSM',url:'https://tile.openstreetmap.org/13/7275/3225.png'},
  {name:'OSM-FR',url:'https://a.tile.openstreetmap.fr/hot/13/7275/3225.png'},
  {name:'CartoDB',url:'https://a.basemaps.cartocdn.com/rastertiles/voyager/13/7275/3225.png'},
  {name:'ArcGIS',url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/13/3225/7275'},
  {name:'Stamen',url:'https://tiles.stadiamaps.com/tiles/stamen_terrain/13/7275/3225.png'},
  {name:'Google',url:'https://mt1.google.com/vt/lyrs=m&x=7275&y=3225&z=13'}
];
var log=document.getElementById('log');
servers.forEach(function(s){
  var img=new Image();
  var div=document.createElement('div');
  div.style.margin='8px 0';
  div.textContent=s.name+': 로딩중...';
  log.appendChild(div);
  img.onload=function(){
    div.innerHTML=s.name+': ✅ <b>작동!</b> ';
    div.appendChild(img);
    img.style.width='80px';img.style.height='80px';img.style.verticalAlign='middle';
  };
  img.onerror=function(){div.innerHTML=s.name+': ❌ 차단됨';};
  img.src=s.url;
});
</script>
</body>
</html>

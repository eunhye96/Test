<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debug</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css"/>
</head>
<body>
<h2>Debug Test v2</h2>
<div id="log" style="font-family:monospace;font-size:13px;padding:10px;background:#f0f0f0;white-space:pre-wrap"></div>
<div id="testMap" style="width:100%;height:300px;background:#ddd;margin-top:10px"></div>

<script>
var logEl = document.getElementById('log');
function addLog(msg){ logEl.textContent += msg + '\n'; }

addLog('1. Page loaded');

// Test jsdelivr
var img = new Image();
img.onload = function(){ addLog('2. ✅ jsdelivr reachable (image test)'); };
img.onerror = function(){ addLog('2. ❌ jsdelivr NOT reachable'); };
img.src = 'https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/images/marker-icon.png';

// Load Leaflet
var js = document.createElement('script');
js.src = 'https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js';
js.onload = function(){
  addLog('3. ✅ Leaflet JS loaded');
  addLog('4. typeof L.map = ' + typeof L.map);
  try {
    var map = L.map('testMap').setView([35.676, 139.735], 12);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    addLog('5. ✅ Map created!');
    setTimeout(function(){ map.invalidateSize(); addLog('6. ✅ invalidateSize done'); }, 500);
  } catch(e) {
    addLog('5. ❌ Map error: ' + e.message);
  }
};
js.onerror = function(){ addLog('3. ❌ Leaflet JS FAILED to load from jsdelivr'); };
document.body.appendChild(js);
</script>
</body>
</html>

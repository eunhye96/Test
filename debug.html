<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Debug v3</title>
<link rel="stylesheet" href="leaflet.css"/>
<script src="leaflet.js"></script>
<style>
#map1{width:100%;height:300px;background:#ddd}
.box{display:none}
.box.active{display:block}
</style>
</head>
<body style="font-family:sans-serif;padding:10px">
<h3>Test 1: 바로 보이는 지도</h3>
<div id="map1"></div>

<h3 style="margin-top:20px">Test 2: display:none에서 시작하는 지도</h3>
<button onclick="document.getElementById('box2').classList.add('active')">보이기</button>
<div class="box" id="box2">
  <div id="map2" style="width:100%;height:300px;background:#ddd"></div>
</div>

<div id="log" style="margin-top:20px;font-family:monospace;font-size:12px;background:#f0f0f0;padding:10px;white-space:pre-wrap"></div>

<script>
var logEl=document.getElementById('log');
function addLog(m){logEl.textContent+=m+'\n'}

addLog('Leaflet loaded: '+(typeof L!=='undefined'));

// Test 1: visible map
try{
  var m1=L.map('map1').setView([35.676,139.735],12);
  L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',{subdomains:'abc'}).addTo(m1);
  addLog('Test1: map created');
  setTimeout(function(){m1.invalidateSize();addLog('Test1: invalidateSize')},500);
}catch(e){addLog('Test1 error: '+e.message)}

// Test 2: hidden map
try{
  var m2=L.map('map2').setView([35.676,139.735],12);
  L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',{subdomains:'abc'}).addTo(m2);
  addLog('Test2: map created (hidden)');
  document.querySelector('button').addEventListener('click',function(){
    setTimeout(function(){m2.invalidateSize();addLog('Test2: invalidateSize after show')},300);
  });
}catch(e){addLog('Test2 error: '+e.message)}
</script>
</body>
</html>
